services:
  # Backend API Server
  - type: web
    name: vid-master-api
    runtime: docker
    dockerFilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false # Set this in the Render dashboard manually
      - key: SESSION_SECRET
        generateValue: true
    healthCheckPath: /api/healthz

  # Frontend Web App (Static Site)
  - type: static
    name: vid-master-web
    buildCommand: pnpm install --no-frozen-lockfile && pnpm --filter @workspace/vid-master build --prod
    publishDir: ./artifacts/vid-master/dist/public
    envVars:
      - key: VITE_API_URL
        value: https://vehicle-driving-learning-api.onrender.com
      - key: NODE_VERSION
        value: 20.x
      - key: PNPM_VERSION
        value: 11.x
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
