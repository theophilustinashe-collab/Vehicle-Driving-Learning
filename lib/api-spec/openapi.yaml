openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: VID Master Zimbabwe API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: questions
    description: Question bank management
  - name: tests
    description: Exam sessions and results
  - name: progress
    description: User progress and stats
  - name: signs
    description: Road signs library
  - name: admin
    description: Admin management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- AUTH ---
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # --- QUESTIONS ---
  /questions:
    get:
      operationId: listQuestions
      tags: [questions]
      summary: List questions (with optional filters)
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: difficulty
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Create a new question (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"

  /questions/{id}:
    get:
      operationId: getQuestion
      tags: [questions]
      summary: Get question by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
    patch:
      operationId: updateQuestion
      tags: [questions]
      summary: Update a question (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete a question (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # --- TESTS ---
  /tests/start:
    post:
      operationId: startTest
      tags: [tests]
      summary: Start a new timed test session (25 questions, 8 min)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartTestInput"
      responses:
        "201":
          description: Test session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestSession"

  /tests/{sessionId}/submit:
    post:
      operationId: submitTest
      tags: [tests]
      summary: Submit test answers and get results
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestSubmission"
      responses:
        "200":
          description: Test results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestResult"

  /tests/history:
    get:
      operationId: getTestHistory
      tags: [tests]
      summary: Get current user's test history
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: Test history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TestResult"

  /tests/{sessionId}:
    get:
      operationId: getTestResult
      tags: [tests]
      summary: Get a specific test result by session ID
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestResult"

  # --- PROGRESS ---
  /progress/stats:
    get:
      operationId: getUserStats
      tags: [progress]
      summary: Get current user's overall stats and progress
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  /progress/dashboard:
    get:
      operationId: getDashboard
      tags: [progress]
      summary: Get dashboard summary (recent tests, accuracy, streak, readiness)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /progress/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [progress]
      summary: Get top learners leaderboard
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [daily, weekly, monthly, alltime]
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /progress/category-breakdown:
    get:
      operationId: getCategoryBreakdown
      tags: [progress]
      summary: Get accuracy breakdown by question category
      responses:
        "200":
          description: Category breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryStat"

  /progress/bookmarks:
    get:
      operationId: getBookmarks
      tags: [progress]
      summary: Get user's bookmarked questions
      responses:
        "200":
          description: Bookmarked questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: addBookmark
      tags: [progress]
      summary: Bookmark a question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookmarkInput"
      responses:
        "201":
          description: Bookmarked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /progress/bookmarks/{questionId}:
    delete:
      operationId: removeBookmark
      tags: [progress]
      summary: Remove a bookmark
      parameters:
        - in: path
          name: questionId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # --- ROAD SIGNS ---
  /signs:
    get:
      operationId: listSigns
      tags: [signs]
      summary: List road signs (with optional category filter)
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Road signs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoadSign"
    post:
      operationId: createSign
      tags: [signs]
      summary: Create a road sign (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoadSignInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoadSign"

  /signs/{id}:
    get:
      operationId: getSign
      tags: [signs]
      summary: Get road sign by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Road sign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoadSign"
    patch:
      operationId: updateSign
      tags: [signs]
      summary: Update a road sign (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoadSignInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoadSign"
    delete:
      operationId: deleteSign
      tags: [signs]
      summary: Delete a road sign (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # --- ADMIN ---
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform-wide admin statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users (admin)
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [admin]
      summary: Update a user's role (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # Auth
    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 6
        name:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    User:
      type: object
      required: [id, email, name, role, xp, level, streak, createdAt, language, soundEnabled]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        city:
          type: string
        phone:
          type: string
        avatarUrl:
          type: string
        language:
          type: string
        soundEnabled:
          type: integer
        role:
          type: string
          enum: [learner, admin]
        xp:
          type: integer
        level:
          type: integer
        streak:
          type: integer
        totalTests:
          type: integer
        passRate:
          type: ["number", "null"]
        createdAt:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    # Questions
    Question:
      type: object
      required: [id, text, options, correctAnswer, category, difficulty, explanation]
      properties:
        id:
          type: integer
        text:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: integer
        category:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        explanation:
          type: string
        imageUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, approved, published, archived]
        createdAt:
          type: string

    QuestionInput:
      type: object
      required: [text, options, correctAnswer, category, difficulty, explanation]
      properties:
        text:
          type: string
        options:
          type: array
          items:
            type: string
          minItems: 3
          maxItems: 4
        correctAnswer:
          type: integer
        category:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        explanation:
          type: string
        imageUrl:
          type: string

    QuestionPatch:
      type: object
      properties:
        text:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: integer
        category:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        explanation:
          type: string
        imageUrl:
          type: string
        status:
          type: string
          enum: [draft, approved, published, archived]

    # Tests
    StartTestInput:
      type: object
      properties:
        mode:
          type: string
          enum: [timed, practice]

    AnswerInput:
      type: object
      required: [questionId, selectedAnswer]
      properties:
        questionId:
          type: integer
        selectedAnswer:
          type: integer

    TestSubmission:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/AnswerInput"

    TestSession:
      type: object
      required: [sessionId, questions, startedAt, expiresAt, durationSeconds]
      properties:
        sessionId:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
        startedAt:
          type: string
        expiresAt:
          type: string
        durationSeconds:
          type: integer
        mode:
          type: string

    AnswerDetail:
      type: object
      required: [questionId, selectedAnswer, correctAnswer, isCorrect]
      properties:
        questionId:
          type: integer
        selectedAnswer:
          type: integer
        correctAnswer:
          type: integer
        isCorrect:
          type: boolean
        explanation:
          type: string

    TestResult:
      type: object
      required: [sessionId, score, total, percentage, passed, timeTaken, completedAt]
      properties:
        sessionId:
          type: string
        score:
          type: integer
        total:
          type: integer
        percentage:
          type: number
        passed:
          type: boolean
        timeTaken:
          type: integer
        completedAt:
          type: string
        mode:
          type: string
        answers:
          type: array
          items:
            $ref: "#/components/schemas/AnswerDetail"

    # Progress
    UserStats:
      type: object
      required: [totalTests, totalQuestions, correctAnswers, accuracy, streak, xp, level, rank]
      properties:
        totalTests:
          type: integer
        totalQuestions:
          type: integer
        correctAnswers:
          type: integer
        accuracy:
          type: number
        streak:
          type: integer
        xp:
          type: integer
        level:
          type: integer
        rank:
          type: string
        examReadiness:
          type: number
        weeklyActivity:
          type: array
          items:
            type: integer

    DashboardSummary:
      type: object
      required: [recentTests, accuracy, streak, examReadiness, totalTests, xp, level, rank]
      properties:
        recentTests:
          type: array
          items:
            $ref: "#/components/schemas/TestResult"
        accuracy:
          type: number
        streak:
          type: integer
        examReadiness:
          type: number
        totalTests:
          type: integer
        xp:
          type: integer
        level:
          type: integer
        rank:
          type: string
        weeklyActivity:
          type: array
          items:
            type: integer

    LeaderboardEntry:
      type: object
      required: [rank, userId, name, xp, level, accuracy, totalTests]
      properties:
        rank:
          type: integer
        userId:
          type: integer
        name:
          type: string
        city:
          type: string
        xp:
          type: integer
        level:
          type: integer
        accuracy:
          type: number
        totalTests:
          type: integer

    CategoryStat:
      type: object
      required: [category, total, correct, accuracy]
      properties:
        category:
          type: string
        total:
          type: integer
        correct:
          type: integer
        accuracy:
          type: number

    BookmarkInput:
      type: object
      required: [questionId]
      properties:
        questionId:
          type: integer

    # Road Signs
    RoadSign:
      type: object
      required: [id, name, category, meaning, imageUrl]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        meaning:
          type: string
        imageUrl:
          type: string
        usage:
          type: ["string", "null"]

    RoadSignInput:
      type: object
      required: [name, category, meaning, imageUrl]
      properties:
        name:
          type: string
        category:
          type: string
        meaning:
          type: string
        imageUrl:
          type: string
        usage:
          type: string

    # Admin
    AdminStats:
      type: object
      required: [totalUsers, totalQuestions, totalTests, passRate, activeToday]
      properties:
        totalUsers:
          type: integer
        totalQuestions:
          type: integer
        totalTests:
          type: integer
        passRate:
          type: number
        activeToday:
          type: integer

    UserRoleUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [learner, admin]
