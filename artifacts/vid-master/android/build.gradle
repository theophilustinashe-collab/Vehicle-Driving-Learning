// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle:8.5.0')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.20')
  }
}

ext {
    buildToolsVersion = "35.0.0"
    minSdkVersion = 24
    compileSdkVersion = 35
    targetSdkVersion = 34
    ndkVersion = "26.1.10909125"
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }

  // Shorten build paths on Windows to avoid "Filename too long" errors
  if (System.getProperty("os.name").toLowerCase().contains("windows")) {
      // Redirect build directory for subprojects to a very short path to avoid MAX_PATH issues.
      // We use a directory in the user's home folder which is typically much shorter.
      def userHome = System.getProperty("user.home")
      if (project != rootProject && project.name != "app") {
          def isNodeModule = projectDir.absolutePath.contains("node_modules") || projectDir.absolutePath.contains(".pnpm")
          if (isNodeModule) {
              def shortHash = project.name.hashCode().abs() % 10000
              def newBuildDir = file("$userHome/.b/$shortHash")
              project.layout.buildDirectory.set(newBuildDir)
              project.buildDir = newBuildDir
          }
      }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

// Shorten build paths on Windows to avoid "Filename too long" errors
// This moves the .cxx folder for all subprojects (especially those in node_modules)
// to a central location under the android/ folder.
subprojects {
    def configureNativeBuild = {
        if (project.hasProperty('android')) {
            project.android {
                if (rootProject.ext.has("ndkVersion")) {
                    ndkVersion rootProject.ext.ndkVersion
                }
                try {
                    externalNativeBuild {
                        cmake {
                            if (System.getProperty("os.name").toLowerCase().contains("windows")) {
                                def userHome = System.getProperty("user.home")
                                def shortHash = project.name.hashCode().abs() % 10000
                                buildStagingDirectory = "$userHome/.c/$shortHash"
                            }
                        }
                    }
                } catch (Exception e) {
                    // Ignore if externalNativeBuild is not available
                }
            }
        }
    }
    try {
        if (project.state.executed) {
            configureNativeBuild()
        } else {
            project.afterEvaluate {
                configureNativeBuild()
            }
        }
    } catch (Exception e) {
        configureNativeBuild()
    }
}
