// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle:8.5.0')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.20')
  }
}

ext {
    buildToolsVersion = "35.0.0"
    minSdkVersion = 24
    compileSdkVersion = 35
    targetSdkVersion = 34
    ndkVersion = "26.1.10909125"
    kotlinVersion = "2.1.20"
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }

  // Shorten build paths on Windows to avoid "Filename too long" errors
  if (System.getProperty("os.name").toLowerCase().contains("windows")) {
      def configureShortPaths = { p ->
          if (p != rootProject && p.name != "app") {
              def userHome = System.getProperty("user.home")
              def shortHash = p.path.hashCode().abs()
              def newBuildDir = file("$userHome/.b/$shortHash")
              p.layout.buildDirectory.set(newBuildDir)
              p.buildDir = newBuildDir
          }
      }
      configureShortPaths(project)
      afterEvaluate { p -> configureShortPaths(p) }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

// Shorten build paths on Windows to avoid "Filename too long" errors
// This moves the .cxx folder for all subprojects (especially those in node_modules)
// to a central location under the android/ folder.
subprojects {
    def configureNativeBuild = {
        if (project.hasProperty('android')) {
            project.android {
                if (rootProject.ext.has("ndkVersion")) {
                    ndkVersion rootProject.ext.ndkVersion
                }
                try {
                    externalNativeBuild {
                        cmake {
                            if (System.getProperty("os.name").toLowerCase().contains("windows")) {
                                def userHome = System.getProperty("user.home")
                                def shortHash = project.path.hashCode().abs()
                                buildStagingDirectory = "$userHome/.c/$shortHash"
                            }
                        }
                    }
                } catch (Exception e) {
                    // Ignore if externalNativeBuild is not available
                }
            }
        }
    }
    try {
        if (project.state.executed) {
            configureNativeBuild()
        } else {
            project.afterEvaluate {
                configureNativeBuild()
            }
        }
    } catch (Exception e) {
        configureNativeBuild()
    }
}
